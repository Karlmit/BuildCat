<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -30 336 336" width="1024" height="1024" role="img" aria-label="Glowing green cat lightbulb icon lit from the upper left">
  <defs>
    <path id="catShape" d="M 16.0 15.0 C 14.5 16.8, 13.8 19.1, 13.0 22.0 C 12.2 24.9, 11.0 21.2, 11.0 34.0 C 11.0 46.8, 13.3 93.7, 13.0 107.0 C 12.7 120.3, 10.7 118.3, 9.0 123.0 C 7.3 127.7, 3.4 134.6, 2.0 138.0 C 0.6 141.4, 0.3 143.3, 0.0 146.0 C -0.3 148.7, -0.6 151.5, 0.0 156.0 C 0.6 160.5, 2.5 170.8, 4.0 176.0 C 5.5 181.2, 7.8 186.7, 10.0 191.0 C 12.2 195.3, 15.7 200.9, 19.0 205.0 C 22.3 209.1, 26.6 213.9, 32.0 218.0 C 37.4 222.1, 47.2 228.6, 55.0 232.0 C 62.8 235.4, 75.0 239.1, 84.0 241.0 C 93.0 242.9, 105.1 244.4, 115.0 245.0 C 124.9 245.6, 141.6 245.4, 150.0 245.0 C 158.4 244.6, 164.2 243.7, 171.0 242.0 C 177.8 240.3, 188.2 237.0, 195.0 234.0 C 201.8 231.0, 210.8 225.6, 216.0 222.0 C 221.2 218.4, 226.4 213.6, 230.0 210.0 C 233.6 206.4, 237.3 201.9, 240.0 198.0 C 242.7 194.1, 246.2 187.8, 248.0 184.0 C 249.8 180.2, 250.9 176.9, 252.0 173.0 C 253.1 169.1, 254.7 163.1, 255.0 158.0 C 255.3 152.9, 255.2 143.7, 254.0 139.0 C 252.8 134.3, 248.9 132.4, 247.0 127.0 C 245.1 121.6, 241.9 110.8, 241.0 103.0 C 240.1 95.2, 240.6 82.5, 241.0 75.0 C 241.4 67.5, 243.6 59.0, 244.0 53.0 C 244.4 47.0, 244.3 39.6, 244.0 35.0 C 243.7 30.4, 243.2 25.4, 242.0 22.0 C 240.8 18.6, 237.5 13.8, 236.0 12.0 C 234.5 10.2, 233.5 10.3, 232.0 10.0 C 230.5 9.7, 228.8 9.1, 226.0 10.0 C 223.2 10.9, 217.7 12.8, 213.0 16.0 C 208.3 19.1, 200.6 25.9, 195.0 31.0 C 189.4 36.1, 179.6 47.1, 176.0 50.0 C 172.4 52.9, 173.2 50.6, 171.0 50.0 C 168.8 49.4, 165.7 47.2, 161.0 46.0 C 156.3 44.8, 146.9 42.6, 140.0 42.0 C 133.1 41.4, 121.9 41.4, 115.0 42.0 C 108.1 42.6, 99.1 44.6, 94.0 46.0 C 88.9 47.4, 83.4 50.4, 81.0 51.0 C 78.6 51.6, 82.5 54.2, 78.0 50.0 C 73.5 45.8, 56.7 28.2, 51.0 23.0 C 45.3 17.8, 43.3 16.9, 40.0 15.0 C 36.7 13.1, 31.6 10.8, 29.0 10.0 C 26.4 9.2, 24.9 9.2, 23.0 10.0 C 21.1 10.8, 17.5 13.2, 16.0 15.0 Z"/>

    <clipPath id="catClip"><use href="#catShape"/></clipPath>

    <!-- Directional body lighting: brighter upper-left, darker lower-right -->
    <linearGradient id="bodyLight" x1="48" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9BFFC0"/>
      <stop offset="18%" stop-color="#53F28C"/>
      <stop offset="46%" stop-color="#22D96A"/>
      <stop offset="76%" stop-color="#15BE66"/>
      <stop offset="100%" stop-color="#0FA35A"/>
    </linearGradient>

    <!-- subtle bulb glow from center/lower-left like the png -->
    <radialGradient id="innerGlow" cx="44%" cy="64%" r="66%">
      <stop offset="0%" stop-color="#5BFFA1" stop-opacity="0.85"/>
      <stop offset="42%" stop-color="#3CF67F" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#3CF67F" stop-opacity="0"/>
    </radialGradient>

    <!-- broad top highlight biased to the left -->
    <radialGradient id="mainHighlight" cx="31%" cy="20%" r="43%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="25%" stop-color="#F4FFF7" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#DFFFF0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#DFFFF0" stop-opacity="0"/>
    </radialGradient>

    <!-- smaller secondary highlight on right ear, weaker than left -->
    <radialGradient id="earHighlight" cx="65%" cy="17%" r="22%">
      <stop offset="0%" stop-color="#F8FFF9" stop-opacity="0.22"/>
      <stop offset="52%" stop-color="#E8FFF0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8FFF0" stop-opacity="0"/>
    </radialGradient>

    <!-- right/bottom shadow to enhance the directional light -->
    <linearGradient id="shadowOverlay" x1="88" y1="66" x2="250" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B6B3D" stop-opacity="0"/>
      <stop offset="58%" stop-color="#0B6B3D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#064D2B" stop-opacity="0.28"/>
    </linearGradient>

    <!-- rim brighter on upper-left edge -->
    <linearGradient id="rimStroke" x1="20" y1="16" x2="236" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D8FFE7" stop-opacity="0.95"/>
      <stop offset="22%" stop-color="#A2FFC4" stop-opacity="0.88"/>
      <stop offset="52%" stop-color="#5BFFA1" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#0B9555" stop-opacity="0.22"/>
    </linearGradient>

    <filter id="outerGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feGaussianBlur stdDeviation="19" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.1"/>
    </filter>

    <filter id="tinyBlur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
  </defs>

  <!-- asymmetric outer glow, slightly stronger on upper-left -->
  <g opacity="0.95">
    <use href="#catShape" fill="#18B967" opacity="0.44" filter="url(#outerGlow)"/>
    <use href="#catShape" fill="#26E36F" opacity="0.26" filter="url(#outerGlow)" transform="translate(-4,-5) scale(1.02)"/>
  </g>

  <g clip-path="url(#catClip)">
    <!-- main body -->
    <use href="#catShape" fill="url(#bodyLight)"/>
    <ellipse cx="118" cy="172" rx="108" ry="98" fill="url(#innerGlow)" filter="url(#softBlur)"/>

    <!-- left-biased glossy highlight across the top -->
    <ellipse cx="102" cy="54" rx="74" ry="40" fill="url(#mainHighlight)" opacity="0.56" filter="url(#softBlur)"/>
    <ellipse cx="202" cy="36" rx="24" ry="18" fill="url(#earHighlight)" opacity="0.24" filter="url(#softBlur)"/>

    <!-- curved specular band matching light from upper-left -->
    <path d="M 76 84 C 96 60, 148 56, 178 74" fill="none" stroke="#F6FFF9" stroke-width="4.2" stroke-linecap="round" opacity="0.34" filter="url(#tinyBlur)"/>
    <path d="M 86 86 C 104 64, 146 61, 168 74" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.24" filter="url(#tinyBlur)"/>

    <!-- specular dots, mainly upper-left -->
    <ellipse cx="55" cy="30" rx="9" ry="3.5" fill="#FFFFFF" opacity="0.26" transform="rotate(-26 55 30)" filter="url(#tinyBlur)"/>
    <ellipse cx="66" cy="44" rx="5" ry="2.2" fill="#FFFFFF" opacity="0.12" transform="rotate(-28 66 44)" filter="url(#tinyBlur)"/>
    <ellipse cx="202" cy="28" rx="8" ry="3.2" fill="#FFFFFF" opacity="0.12" transform="rotate(20 202 28)" filter="url(#tinyBlur)"/>

    <!-- darker far side to sell the directionality -->
    <rect x="0" y="0" width="256" height="256" fill="url(#shadowOverlay)"/>

    <!-- luminous rim -->
    <use href="#catShape" fill="none" stroke="url(#rimStroke)" stroke-width="6" opacity="0.90"/>
    <use href="#catShape" fill="none" stroke="#DFFFF0" stroke-width="1.6" opacity="0.55"/>
  </g>
</svg>
